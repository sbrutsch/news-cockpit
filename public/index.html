<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0A0D14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IT-News">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<title>IT-Nachrichten · News-Cockpit</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230A0D14'/%3E%3Ctext x='15' y='22' font-family='Georgia' font-size='17' font-weight='bold' font-style='italic' fill='%23E6EAF2' text-anchor='middle'%3EN%3C/text%3E%3Ccircle cx='24' cy='21' r='2.6' fill='%23E04848'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0A0D14;
    --bg-soft: #0E1320;
    --elev: rgba(255,255,255,0.025);
    --elev-strong: rgba(255,255,255,0.055);
    --line: rgba(148,163,184,0.14);
    --line-soft: rgba(148,163,184,0.08);
    --text: #E8ECF4;
    --muted: #97A1B4;
    --faint: #5C6577;
    --rot: #E04848;          /* Stefans Akzentrot, für Dunkel aufgehellt — nur für Wichtiges */
    --rot-dim: rgba(224,72,72,0.14);
    --amber: #E3B34F;        /* Content-Ideen */
    --amber-dim: rgba(227,179,79,0.12);
    --serif: Georgia, "Times New Roman", serif;
    --sans: "Source Sans 3", "Source Sans Pro", "Segoe UI", system-ui, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; scrollbar-color: #2A3245 var(--bg); }
  body {
    font-family: var(--sans);
    background:
      radial-gradient(900px 420px at 18% -8%, rgba(64,96,160,0.16), transparent 60%),
      radial-gradient(700px 380px at 95% 0%, rgba(224,72,72,0.05), transparent 55%),
      var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.55;
    min-height: 100vh;
  }
  a { color: inherit; }
  button { font: inherit; background: none; border: 0; cursor: pointer; color: inherit; }
  input { font: inherit; }
  ::selection { background: rgba(224,72,72,0.35); }
  :focus-visible { outline: 2px solid var(--rot); outline-offset: 2px; border-radius: 4px; }

  .wrap { max-width: 960px; margin: 0 auto; padding: 44px 30px 90px; }

  /* ---------- Masthead ---------- */
  .masthead { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; padding-bottom: 20px; }
  .brand h1 {
    font-family: var(--serif); font-size: 36px; font-weight: 700; letter-spacing: -0.015em;
    line-height: 1.05; color: var(--text);
  }
  .brand h1 .dot { color: var(--rot); }
  .brand .sub { color: var(--faint); font-size: 13.5px; margin-top: 7px; letter-spacing: 0.02em; }
  .masthead .right { text-align: right; white-space: nowrap; }
  .masthead .today { display: block; color: var(--muted); font-size: 13.5px; font-family: var(--serif); font-style: italic; }
  #logoutBtn { color: var(--faint); font-size: 12.5px; margin-top: 4px; transition: color .15s; }
  #logoutBtn:hover { color: var(--text); }

  /* ---------- Sticky Toolbar ---------- */
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 12px 0;
    background: rgba(10,13,20,0.82);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line-soft);
  }
  .tabs {
    display: flex; gap: 2px; padding: 3px;
    background: var(--elev); border: 1px solid var(--line-soft); border-radius: 10px;
  }
  .tab {
    padding: 7px 15px; border-radius: 8px; color: var(--muted); font-size: 14px; font-weight: 600;
    transition: color .15s, background .15s; white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); background: var(--elev-strong); box-shadow: 0 1px 6px rgba(0,0,0,0.35); }
  .tab .count {
    color: var(--faint); font-weight: 600; font-size: 12px; margin-left: 6px;
    font-variant-numeric: tabular-nums;
  }
  .tab.active .count { color: var(--rot); }

  .search { display: flex; align-items: center; gap: 8px; color: var(--faint); }
  .search input {
    border: 1px solid var(--line-soft); border-radius: 9px; background: var(--elev);
    width: 150px; padding: 7px 12px; font-size: 14px; color: var(--text);
    transition: width .25s ease, border-color .2s, background .2s;
  }
  .search input:focus { width: 240px; border-color: rgba(148,163,184,0.35); background: var(--elev-strong); outline: none; }
  .search input::placeholder { color: var(--faint); }
  .tool-btn {
    width: 34px; height: 34px; border-radius: 9px; color: var(--faint);
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--line-soft); transition: all .15s;
  }
  .tool-btn:hover { color: var(--text); background: var(--elev); border-color: var(--line); }

  /* ---------- Art-Filter (kind) ---------- */
  .kinds { display: flex; gap: 8px; padding: 14px 0 4px; flex-wrap: wrap; }
  .kind-chip {
    font-size: 12.5px; font-weight: 600; color: var(--muted);
    border: 1px solid var(--line-soft); border-radius: 999px; padding: 4px 13px;
    transition: all .15s;
  }
  .kind-chip:hover { color: var(--text); border-color: var(--line); }
  .kind-chip.active { color: var(--text); background: var(--elev-strong); border-color: rgba(148,163,184,0.4); }

  /* ---------- Liste ---------- */
  .list { list-style: none; margin-top: 10px; }
  .entry {
    position: relative;
    padding: 20px 16px 20px 20px; margin: 0 -16px;
    border-radius: 12px;
    display: grid; grid-template-columns: 1fr auto; gap: 4px 16px;
    animation: rise .45s cubic-bezier(.2,.7,.3,1) both;
    transition: background .18s, opacity .3s;
  }
  .entry::before {
    content: ""; position: absolute; left: 0; top: 18px; bottom: 18px; width: 3px;
    border-radius: 3px; background: transparent; transition: background .2s;
  }
  .entry:hover { background: var(--elev); }
  .entry.important::before { background: var(--rot); box-shadow: 0 0 12px rgba(224,72,72,0.45); }
  .entry.important { background: linear-gradient(90deg, var(--rot-dim), transparent 45%); }
  .entry.important:hover { background: linear-gradient(90deg, var(--rot-dim), var(--elev) 45%); }
  .entry + .entry { border-top: 1px solid var(--line-soft); border-top-left-radius: 0; border-top-right-radius: 0; }
  .entry.leaving { opacity: 0; transform: translateX(10px); }
  @keyframes rise { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: none; } }

  .entry .meta { grid-column: 1; display: flex; align-items: center; gap: 9px; font-size: 12.5px; flex-wrap: wrap; }
  .entry .source { color: var(--muted); font-weight: 700; letter-spacing: 0.015em; }
  .entry .dot { color: var(--faint); opacity: .6; }
  .entry .time { color: var(--faint); font-variant-numeric: tabular-nums; }
  .chip {
    font-size: 11.5px; font-weight: 700; border-radius: 5px; padding: 1.5px 8px;
    border: 1px solid var(--line-soft); color: var(--muted); letter-spacing: 0.02em;
  }
  .chip.idee { color: var(--amber); border-color: rgba(227,179,79,0.4); background: var(--amber-dim); }
  .chip.zitat { color: var(--muted); border-color: var(--line); background: var(--elev-strong); font-family: var(--serif); font-style: italic; }
  .chip.pillar { color: var(--muted); background: var(--elev); }
  .chip.archiviert { color: var(--faint); }

  .entry h2 { grid-column: 1; font-size: 17.5px; font-weight: 650; line-height: 1.4; margin-top: 5px; letter-spacing: -0.005em; }
  .entry h2 a { text-decoration: none; transition: color .15s; }
  .entry h2 a:hover { color: #fff; text-decoration: underline; text-decoration-color: var(--rot); text-decoration-thickness: 2px; text-underline-offset: 4px; }

  .entry .summary { grid-column: 1; color: var(--muted); font-size: 14.5px; line-height: 1.6; margin-top: 5px; max-width: 80ch; }
  .entry .summary.zitat {
    font-family: var(--serif); font-style: italic; font-size: 15.5px; color: #C3CBDA;
    border-left: 2px solid var(--line); padding-left: 14px; margin-top: 8px;
  }

  .actions {
    grid-column: 2; grid-row: 1 / span 3; align-self: start;
    display: flex; gap: 3px; opacity: 0; transform: translateX(4px);
    transition: opacity .18s, transform .18s;
  }
  .entry:hover .actions, .entry:focus-within .actions { opacity: 1; transform: none; }
  .actions button {
    width: 34px; height: 34px; border-radius: 8px; color: var(--faint);
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .actions button:hover { background: var(--elev-strong); color: var(--text); }
  .actions button.star-on { color: var(--rot); opacity: 1; }
  .actions button.confirm { width: auto; padding: 0 11px; color: #fff; background: var(--rot); font-size: 12.5px; font-weight: 700; }
  @keyframes pop { 40% { transform: scale(1.3) rotate(8deg); } }
  .actions button.popping svg { animation: pop .35s ease; }

  /* ---------- Notiz ---------- */
  .note-block {
    grid-column: 1; margin-top: 9px; padding: 8px 13px; cursor: pointer;
    background: var(--amber-dim); border-left: 2px solid rgba(227,179,79,0.5);
    border-radius: 0 9px 9px 0; transition: background .15s;
  }
  .note-block:hover { background: rgba(227,179,79,0.18); }
  .note-block .note-label { font-size: 11px; font-weight: 700; color: var(--amber); letter-spacing: .05em; margin-bottom: 2px; }
  .note-block .note-text { font-size: 13.5px; line-height: 1.55; color: #D9CEAF; white-space: pre-wrap; }
  .note-editor { grid-column: 1; margin-top: 9px; }
  .note-editor textarea {
    width: 100%; min-height: 76px; background: var(--elev); border: 1px solid var(--line);
    border-radius: 10px; color: var(--text); font: inherit; font-size: 13.5px;
    line-height: 1.55; padding: 10px 13px; resize: vertical;
  }
  .note-editor textarea:focus { outline: none; border-color: rgba(227,179,79,0.5); }
  .note-editor .row { display: flex; gap: 8px; margin-top: 8px; }
  .actions button.note-on { color: var(--amber); }

  /* ---------- Resümee (KI-Einordnung) ---------- */
  :root { --gruen: #3FA96C; }
  .res-block {
    grid-column: 1; margin-top: 9px; padding: 8px 13px;
    background: var(--elev); border-left: 2px solid var(--line);
    border-radius: 0 9px 9px 0;
  }
  .res-block.hoch { border-left-color: var(--gruen); background: rgba(63,169,108,0.09); }
  .res-block.mittel { border-left-color: var(--amber); background: rgba(227,179,79,0.07); }
  .res-block.gering { border-left-color: var(--faint); }
  .res-block .res-label { font-size: 11px; font-weight: 700; letter-spacing: .05em; margin-bottom: 2px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .res-block .res-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); }
  .res-block.hoch .res-dot { background: var(--gruen); }
  .res-block.hoch .res-label { color: var(--gruen); }
  .res-block.mittel .res-dot { background: var(--amber); }
  .res-block.mittel .res-label { color: var(--amber); }
  .res-block .res-text { font-size: 13.5px; line-height: 1.55; color: var(--muted); white-space: pre-wrap; }
  .res-block .res-loading { display: flex; gap: 6px; padding: 4px 0; }
  .res-block .res-loading span { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); animation: vwpulse 1.2s infinite; }
  .res-block .res-loading span:nth-child(2) { animation-delay: .2s; }
  .res-block .res-loading span:nth-child(3) { animation-delay: .4s; }

  /* ---------- Tagesbriefing ---------- */
  .briefing {
    margin: 18px 0 4px; padding: 16px 20px;
    border: 1px solid var(--line-soft); border-radius: 14px;
    background: linear-gradient(135deg, rgba(64,96,160,0.10), var(--elev));
    animation: rise .45s ease both;
  }
  .briefing .b-date { font-family: var(--serif); font-style: italic; color: var(--muted); font-size: 13px; }
  .briefing .b-line { font-size: 15px; margin-top: 4px; color: var(--muted); }
  .briefing .b-line strong { color: var(--text); }
  .briefing .b-pillars { color: var(--faint); font-size: 12.5px; margin-top: 7px; }

  /* ---------- Datums-Trenner ---------- */
  .day-sep {
    list-style: none; padding: 24px 0 4px; display: flex; align-items: center; gap: 12px;
    color: var(--faint); font-size: 12px; font-weight: 700; letter-spacing: .06em;
  }
  .day-sep::after { content: ""; flex: 1; height: 1px; background: var(--line-soft); }

  /* ---------- Zustände ---------- */
  .state { text-align: center; color: var(--muted); padding: 90px 0 30px; }
  .state .orn { font-family: var(--serif); font-style: italic; color: var(--faint); font-size: 30px; display: block; margin-bottom: 12px; }
  .state .hint { color: var(--faint); font-size: 13.5px; margin-top: 8px; }

  .more {
    display: block; margin: 30px auto 0; color: var(--muted); font-size: 13.5px; font-weight: 600;
    padding: 10px 22px; border: 1px solid var(--line-soft); border-radius: 999px;
    transition: all .15s;
  }
  .more:hover { color: var(--text); border-color: var(--line); background: var(--elev); }
  .more[hidden] { display: none; }

  footer {
    margin-top: 70px; border-top: 1px solid var(--line-soft); padding-top: 16px;
    color: var(--faint); font-size: 12px; display: flex; justify-content: space-between; gap: 12px;
  }
  footer .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #3FA96C; margin-right: 6px; animation: pulse 2.6s infinite; vertical-align: 1px; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  /* ---------- Login ---------- */
  .login-overlay {
    position: fixed; inset: 0; z-index: 50;
    background:
      radial-gradient(700px 380px at 30% 20%, rgba(64,96,160,0.18), transparent 60%),
      var(--bg);
    display: flex; align-items: center; justify-content: center; padding: 28px;
  }
  .login-overlay[hidden] { display: none; }
  .login-box { width: 100%; max-width: 330px; animation: rise .5s ease both; }
  .login-box h1 { font-family: var(--serif); font-size: 30px; font-weight: 700; }
  .login-box h1 .dot { color: var(--rot); }
  .login-box .sub { color: var(--faint); font-size: 13px; margin-top: 6px; margin-bottom: 34px; }
  .login-box label { display: block; font-size: 12.5px; font-weight: 600; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.03em; }
  .login-box input {
    width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 11px 14px;
    font-size: 16px; background: var(--elev); color: var(--text);
  }
  .login-box input:focus { outline: none; border-color: rgba(148,163,184,0.45); background: var(--elev-strong); }
  .login-box button {
    width: 100%; margin-top: 22px; background: var(--text); color: var(--bg);
    padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 700;
    transition: transform .12s, background .15s;
  }
  .login-box button:hover { background: #fff; transform: translateY(-1px); }
  .login-error { color: var(--rot); font-size: 13.5px; margin-top: 14px; min-height: 20px; }
  .shake { animation: shake .35s; }
  @keyframes shake { 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }

  /* ---------- Verwerten-Modal ---------- */
  .vw-overlay {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(5,7,12,0.7);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .vw-overlay[hidden] { display: none; }
  .vw-panel {
    width: 100%; max-width: 640px; max-height: 86vh; display: flex; flex-direction: column;
    background: #101623; border: 1px solid var(--line); border-radius: 16px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.6);
    animation: rise .3s ease both;
  }
  .vw-head { display: flex; align-items: center; gap: 10px; padding: 18px 22px 14px; border-bottom: 1px solid var(--line-soft); }
  .vw-head h3 { font-family: var(--serif); font-size: 19px; font-weight: 700; flex: 1; }
  .vw-head h3 .dot { color: var(--rot); }
  .vw-close { color: var(--faint); width: 32px; height: 32px; border-radius: 8px; font-size: 20px; line-height: 1; }
  .vw-close:hover { background: var(--elev-strong); color: var(--text); }
  .vw-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
  .vw-quelle { color: var(--faint); font-size: 12.5px; margin-bottom: 14px; }
  .vw-draft { white-space: pre-wrap; font-size: 15px; line-height: 1.65; color: var(--text); user-select: text; }
  .vw-loading { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 40px 0; color: var(--muted); font-size: 14px; }
  .vw-dots { display: flex; gap: 7px; }
  .vw-dots span { width: 9px; height: 9px; border-radius: 50%; background: var(--rot); animation: vwpulse 1.2s infinite; }
  .vw-dots span:nth-child(2) { animation-delay: .2s; }
  .vw-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes vwpulse { 0%, 100% { opacity: .25; transform: scale(.85); } 50% { opacity: 1; transform: scale(1); } }
  .vw-error { color: var(--rot); font-size: 14px; padding: 30px 0; text-align: center; }
  .vw-foot { display: flex; flex-wrap: wrap; gap: 10px; padding: 14px 22px 18px; border-top: 1px solid var(--line-soft); }
  .vw-btn { padding: 9px 18px; border-radius: 9px; font-size: 13.5px; font-weight: 700; border: 1px solid var(--line-soft); color: var(--muted); transition: all .15s; }
  .vw-btn:hover { color: var(--text); border-color: var(--line); background: var(--elev); }
  .vw-btn.primary { background: var(--text); color: var(--bg); border-color: transparent; }
  .vw-btn.primary:hover { background: #fff; }
  .vw-btn[disabled] { opacity: .4; cursor: default; }

  /* ---------- IT-Leiter-Prüfstand ---------- */
  .pruef-zone { margin-top: 22px; border-top: 1px dashed var(--line); padding-top: 18px; }
  .pruef-titel { font-size: 12px; font-weight: 700; letter-spacing: .06em; color: var(--faint); margin-bottom: 12px; }
  .pruef-karten { display: flex; flex-direction: column; gap: 12px; }
  .pruef-karte { border: 1px solid var(--line-soft); border-radius: 12px; overflow: hidden; }
  .pruef-kopf { display: flex; align-items: center; gap: 11px; padding: 11px 14px; background: var(--elev); }
  .pruef-avatar { width: 34px; height: 34px; border-radius: 50%; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-weight: 700; font-size: 15px; color: var(--bg); }
  .pruef-avatar.ronny { background: linear-gradient(135deg, #6E8BB8, #3E577F); }
  .pruef-avatar.claudia { background: linear-gradient(135deg, #C98BA8, #9E5E7C); }
  .pruef-avatar.markus { background: linear-gradient(135deg, #7FB89B, #4E7F66); }
  .pruef-wer { flex: 1; min-width: 0; }
  .pruef-name { font-size: 14px; font-weight: 650; color: var(--text); }
  .pruef-rolle { font-size: 12px; color: var(--faint); }
  .pruef-score { font-family: var(--serif); font-weight: 700; font-size: 20px; font-variant-numeric: tabular-nums; padding: 2px 10px; border-radius: 8px; }
  .pruef-score.hoch { color: #6FCF97; background: rgba(111,207,151,0.12); }
  .pruef-score.mittel { color: var(--amber); background: var(--amber-dim); }
  .pruef-score.gering { color: var(--rot); background: var(--rot-dim); }
  .pruef-start { font-size: 13px; font-weight: 700; color: var(--muted); padding: 5px 12px; border-radius: 8px; border: 1px solid var(--line-soft); }
  .pruef-start:hover { color: var(--text); border-color: var(--line); background: var(--elev-strong); }
  .pruef-feedback { padding: 12px 15px; font-size: 13.5px; line-height: 1.6; color: var(--summary); white-space: pre-wrap; border-top: 1px solid var(--line-soft); max-height: 320px; overflow-y: auto; }
  .pruef-mini { display: inline-flex; align-items: center; gap: 6px; color: var(--faint); font-size: 12.5px; padding: 8px 0; }
  .pruef-mini .vw-dots span { width: 6px; height: 6px; }
  .pruef-fehler { padding: 10px 15px; color: var(--rot); font-size: 13px; border-top: 1px solid var(--line-soft); }
  .pruef-check { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap; user-select: none; }
  .pruef-check input { accent-color: var(--rot); width: 15px; height: 15px; cursor: pointer; margin: 0; }
  .pruef-check:hover { color: var(--text); }
  .pruef-anweisung {
    width: 100%; margin-top: 14px; background: var(--elev); border: 1px solid var(--line-soft);
    border-radius: 10px; color: var(--text); font: inherit; font-size: 13px; line-height: 1.55;
    padding: 9px 12px; resize: vertical; min-height: 54px;
  }
  .pruef-anweisung::placeholder { color: var(--faint); }
  .pruef-anweisung:focus { outline: none; border-color: var(--line); }

  /* Entwurfstext im Modal direkt editierbar */
  textarea.vw-draft {
    display: block; width: 100%; border: none; background: transparent; padding: 0; margin: 0;
    font: inherit; font-size: 15px; line-height: 1.65; color: var(--text);
    resize: none; outline: none; overflow: hidden; min-height: 100px; border-radius: 6px;
  }
  textarea.vw-draft:focus { box-shadow: -14px 0 0 -12px var(--rot); }

  /* Breites Zwei-Spalten-Modal auf dem Desktop: Entwurf links, Prüfstand rechts.
     Die Breite hängt an .breit (bleibt während Überarbeitungs-Laden erhalten),
     damit das Fenster nicht bei jeder Runde schmal/breit springt. */
  @media (min-width: 1000px) {
    .vw-panel.breit { max-width: 1160px; }
    .vw-body.two-col { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr); gap: 0 30px; align-items: start; }
    .vw-body.two-col .pruef-zone {
      border-top: none; margin-top: 0; padding-top: 0;
      border-left: 1px dashed var(--line); padding-left: 30px; min-height: 100%;
    }
    .vw-body.two-col .pruef-feedback { max-height: 260px; }
  }

  /* ---------- Entwürfe-Tab ---------- */
  .chip.gepostet { color: #6FCF97; border-color: rgba(111,207,151,0.35); background: rgba(111,207,151,0.08); }
  .d-score { font-size: 11.5px; font-weight: 700; padding: 1.5px 8px; border-radius: 5px; font-variant-numeric: tabular-nums; }
  .d-score.hoch { color: #6FCF97; background: rgba(111,207,151,0.12); }
  .d-score.mittel { color: var(--amber); background: var(--amber-dim); }
  .d-score.gering { color: var(--rot); background: var(--rot-dim); }
  .entry.gepostet h2, .entry.gepostet .d-text { opacity: .55; }
  .entry .d-text {
    grid-column: 1; white-space: pre-wrap; color: var(--muted); font-size: 14.5px; line-height: 1.6;
    margin-top: 5px; max-width: 80ch; cursor: pointer;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
  }
  .entry .d-text.open { display: block; -webkit-line-clamp: none; }
  .actions button.check-on { color: #6FCF97; }

  /* Wiederherstellungs-Leiste nach Absturz/Reload */
  .restore-bar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--amber-dim); border: 1px solid rgba(227,179,79,0.4);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 18px;
    font-size: 13.5px; color: var(--text);
  }
  .restore-bar span { flex: 1; min-width: 200px; }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(10px);
    background: #1A2233; border: 1px solid var(--line); color: var(--text);
    font-size: 13.5px; padding: 10px 18px; border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: all .25s; z-index: 60;
    max-width: min(90vw, 480px);
  }
  #toast.show { opacity: 1; transform: translateX(-50%); }

  @media (max-width: 640px) {
    .wrap { padding: 26px 16px 60px; }
    .brand h1 { font-size: 28px; }
    .masthead .right .today { display: none; }
    .toolbar { flex-wrap: wrap; }
    .tabs { width: 100%; justify-content: space-between; }
    .tab { flex: 1; text-align: center; padding: 7px 6px; }
    .search { width: 100%; padding-top: 8px; }
    .search input, .search input:focus { width: 100%; }
    .entry { grid-template-columns: 1fr; padding: 18px 10px 16px 16px; margin: 0 -10px; }
    .actions { grid-column: 1; grid-row: auto; opacity: 1; transform: none; margin-top: 10px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay" hidden>
  <form class="login-box" id="loginForm">
    <h1>IT-Nachrichten<span class="dot">.</span></h1>
    <div class="sub">News-Cockpit · Stefan Brutscher · eigener Server, Frankfurt</div>
    <label for="pw">Passwort</label>
    <input type="password" id="pw" autocomplete="current-password" required autofocus>
    <button type="submit" id="loginBtn">Anmelden</button>
    <div class="login-error" id="loginError"></div>
  </form>
</div>

<div class="wrap" id="appWrap" hidden>
  <header class="masthead">
    <div class="brand">
      <h1>IT-Nachrichten<span class="dot">.</span></h1>
      <div class="sub">Pressespiegel &amp; Themenscout — automatisch gesammelt, von Hand sortiert</div>
    </div>
    <div class="right">
      <span class="today" id="today"></span>
      <button id="logoutBtn" type="button">Abmelden</button>
    </div>
  </header>

  <nav class="toolbar" aria-label="Ansichten">
    <div class="tabs" role="tablist">
      <button class="tab active" role="tab" data-tab="new" aria-selected="true">Neu<span class="count" id="count-new"></span></button>
      <button class="tab" role="tab" data-tab="important" aria-selected="false">Wichtig<span class="count" id="count-important"></span></button>
      <button class="tab" role="tab" data-tab="archived" aria-selected="false">Archiv<span class="count" id="count-archived"></span></button>
      <button class="tab" role="tab" data-tab="drafts" aria-selected="false">Entwürfe<span class="count" id="count-drafts"></span></button>
    </div>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
      <input type="search" id="searchInput" placeholder="Suchen  ( / )" aria-label="Meldungen durchsuchen">
      <button class="tool-btn" id="exportBtn" type="button" title="Wochen-Export: Wichtiges der letzten 7 Tage als Markdown" aria-label="Wochen-Export herunterladen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 11 5 5 5-5"/><path d="M4 19h16"/></svg>
      </button>
    </div>
  </nav>

  <div class="kinds" role="group" aria-label="Nach Art filtern">
    <button class="kind-chip active" data-kind="">Alle</button>
    <button class="kind-chip" data-kind="news">News</button>
    <button class="kind-chip" data-kind="idee">Content-Ideen</button>
    <button class="kind-chip" data-kind="zitat">Zitate</button>
  </div>

  <main>
    <div id="briefing"></div>
    <ul class="list" id="list"></ul>
    <div class="state" id="stateBox" hidden></div>
    <button class="more" id="moreBtn" hidden type="button">Weitere Meldungen laden</button>
  </main>

  <footer>
    <span><span class="pulse"></span>News-Cockpit</span>
    <span>eigener Server · Frankfurt am Main</span>
  </footer>
</div>

<div class="vw-overlay" id="vwOverlay" hidden>
  <div class="vw-panel" role="dialog" aria-modal="true" aria-labelledby="vwTitle">
    <div class="vw-head">
      <h3 id="vwTitle">LinkedIn-Entwurf<span class="dot">.</span></h3>
      <button class="vw-close" id="vwClose" type="button" aria-label="Schließen">×</button>
    </div>
    <div class="vw-body" id="vwBody"></div>
    <div class="vw-foot">
      <button class="vw-btn primary" id="vwCopy" type="button" disabled>Kopieren</button>
      <button class="vw-btn" id="vwSave" type="button" disabled>Speichern</button>
      <button class="vw-btn" id="vwLoop" type="button" disabled title="Alle Prüfer urteilen; bei Bedarf wird automatisch überarbeitet und erneut geprüft — bis ein Urteil mindestens 8/10 erreicht (max. 2 Überarbeitungen). Während des Laufs wird dieser Knopf zum Stopp.">Prüfschleife</button>
      <button class="vw-btn" id="vwRevise" type="button" disabled title="Überarbeitet den Entwurf mit dem angehakten Prüfer-Feedback">Überarbeiten</button>
      <button class="vw-btn" id="vwRetry" type="button" disabled>Neu generieren</button>
      <button class="vw-btn" id="vwCancel" type="button" style="margin-left:auto">Schließen</button>
    </div>
  </div>
</div>

<div id="toast" role="status"></div>

<script>
"use strict";

/* ---------- Icons (statische Strings, nur in Buttons injiziert) ---------- */
const ICONS = {
  star: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3.5l2.6 5.4 5.9.8-4.3 4.1 1.1 5.8L12 16.9l-5.3 2.7 1.1-5.8-4.3-4.1 5.9-.8z"/></svg>',
  starFill: '<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3.5l2.6 5.4 5.9.8-4.3 4.1 1.1 5.8L12 16.9l-5.3 2.7 1.1-5.8-4.3-4.1 5.9-.8z"/></svg>',
  archive: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4.5" rx="1"/><path d="M5 8.5V19a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8.5"/><path d="M10 12.5h4"/></svg>',
  restore: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l4-5h10l4 5"/><path d="M3 9h18v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M12 17v-5"/><path d="m9.5 14.5 2.5-2.5 2.5 2.5"/></svg>',
  trash: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><path d="M6 7l1 13a1 1 0 0 0 1 .9h8a1 1 0 0 0 1-.9L18 7"/><path d="M10 11v6M14 11v6"/></svg>',
  quill: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4c-5 0-11 2.5-13.5 8L4 20l1.5-.5C13 17 17 12 20 4z"/><path d="M9.5 14.5 4 20"/></svg>',
  note: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h14a1 1 0 0 1 1 1v9l-6 6H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M14 20v-5a1 1 0 0 1 1-1h5"/></svg>',
  gauge: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="0.8" fill="currentColor"/></svg>',
  copy: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"/></svg>',
  check: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12.5 2.5 2.5 4.5-5.5"/></svg>',
  open: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4h5v5"/><path d="M20 4 11 13"/><path d="M18 13v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h6"/></svg>'
};

const state = {
  tab: "new", kind: "", q: "", offset: 0, limit: 50,
  items: [], drafts: [], counts: { new: 0, important: 0, archived: 0, drafts: 0 },
  mayHaveMore: false, initialRender: true
};

const $ = (id) => document.getElementById(id);
const listEl = $("list"), stateBox = $("stateBox"), moreBtn = $("moreBtn");

/* ---------- API ---------- */
async function api(path, opts = {}) {
  const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...opts });
  if (res.status === 401) { showLogin(); throw new Error("nicht angemeldet"); }
  let body = null;
  try { body = await res.json(); } catch { /* leer */ }
  if (!res.ok) throw new Error((body && body.detail) || ("Fehler " + res.status));
  return body;
}

/* ---------- Login ---------- */
function showLogin() {
  $("loginOverlay").hidden = false;
  $("appWrap").hidden = true;
  setTimeout(() => $("pw").focus(), 60);
}
function showApp() {
  $("loginOverlay").hidden = true;
  $("appWrap").hidden = false;
}

$("loginForm").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const btn = $("loginBtn"), err = $("loginError");
  err.textContent = ""; btn.disabled = true;
  try {
    await api("/api/login", { method: "POST", body: JSON.stringify({ password: $("pw").value }) });
    $("pw").value = "";
    showApp();
    await load(true);
    checkAutosave();
  } catch (e) {
    err.textContent = e.message === "nicht angemeldet" ? "Falsches Passwort" : e.message;
    const box = document.querySelector(".login-box");
    box.classList.remove("shake"); void box.offsetWidth; box.classList.add("shake");
  } finally {
    btn.disabled = false;
  }
});

$("logoutBtn").addEventListener("click", async () => {
  try { await api("/api/logout", { method: "POST" }); } catch { /* egal */ }
  state.items = []; listEl.textContent = "";
  showLogin();
});

/* ---------- Laden & Rendern ---------- */
async function load(reset) {
  if (state.tab === "drafts") {
    const data = await api("/api/drafts");
    state.drafts = data.items;
    state.counts = data.counts;
    state.mayHaveMore = false;
    render();
    state.initialRender = false;
    return;
  }
  if (reset) { state.offset = 0; state.items = []; }
  const params = new URLSearchParams({ tab: state.tab, limit: state.limit, offset: state.offset });
  if (state.q) params.set("q", state.q);
  if (state.kind) params.set("kind", state.kind);
  const data = await api("/api/items?" + params);
  state.items = state.offset === 0 ? data.items : state.items.concat(data.items);
  state.counts = data.counts;
  state.mayHaveMore = data.items.length === state.limit;
  render();
  state.initialRender = false;
}

function render() {
  render_counts_only();
  document.querySelectorAll(".tab").forEach(t => {
    const active = t.dataset.tab === state.tab;
    t.classList.toggle("active", active);
    t.setAttribute("aria-selected", String(active));
  });
  document.querySelectorAll(".kind-chip").forEach(c => {
    c.classList.toggle("active", c.dataset.kind === state.kind);
  });
  document.querySelector(".kinds").hidden = state.tab === "drafts";

  renderBriefing();

  listEl.textContent = "";
  if (state.tab === "drafts") { renderDrafts(); return; }
  let lastLabel = null;
  state.items.forEach((item, i) => {
    // Gruppierung nach Eingang — konsistent mit Sortierung und Tagesbriefing
    const label = dayLabel(item.ingested_at);
    if (label !== lastLabel) {
      listEl.appendChild(el("li", "day-sep", label));
      lastLabel = label;
    }
    listEl.appendChild(entryNode(item, i));
  });

  if (state.items.length === 0) {
    stateBox.hidden = false;
    stateBox.textContent = "";
    stateBox.append(el("span", "orn", "⁂"), el("div", "", emptyText()), el("div", "hint", emptyHint()));
  } else {
    stateBox.hidden = true;
  }
  moreBtn.hidden = !state.mayHaveMore;
}

function dayLabel(iso) {
  const d = new Date(iso), now = new Date();
  if (isNaN(d)) return "Ohne Datum";
  if (d.toDateString() === now.toDateString()) return "Heute";
  const gestern = new Date(now); gestern.setDate(now.getDate() - 1);
  if (d.toDateString() === gestern.toDateString()) return "Gestern";
  return d.toLocaleDateString("de-DE", { day: "numeric", month: "long" });
}

function erschienenText(item) {
  // Erscheinungsdatum nur zeigen, wenn es von Eingangstag abweicht
  if (!item.published_at) return "";
  const p = new Date(item.published_at), i = new Date(item.ingested_at);
  if (isNaN(p) || isNaN(i) || p.toDateString() === i.toDateString()) return "";
  const opts = { day: "numeric", month: "long" };
  if (p.getFullYear() !== new Date().getFullYear()) opts.year = "numeric";
  return "erschienen " + p.toLocaleDateString("de-DE", opts);
}

function renderBriefing() {
  const box = $("briefing");
  box.textContent = "";
  if (state.tab !== "new" || state.q || state.kind) return;
  const heute = state.items.filter(it => {
    const d = new Date(it.ingested_at);
    return !isNaN(d) && d.toDateString() === new Date().toDateString();
  });
  if (!heute.length) return;
  const kinds = { news: 0, idee: 0, zitat: 0 };
  const pillars = {};
  heute.forEach(it => {
    kinds[it.kind] = (kinds[it.kind] || 0) + 1;
    if (it.pillar) pillars[it.pillar] = (pillars[it.pillar] || 0) + 1;
  });
  const teile = [];
  if (kinds.news) teile.push(kinds.news + (kinds.news === 1 ? " Meldung" : " Meldungen"));
  if (kinds.idee) teile.push(kinds.idee + (kinds.idee === 1 ? " Content-Idee" : " Content-Ideen"));
  if (kinds.zitat) teile.push(kinds.zitat + (kinds.zitat === 1 ? " Zitat" : " Zitate"));
  const top = Object.entries(pillars).sort((a, b) => b[1] - a[1]).slice(0, 3)
    .map(([p, c]) => p + " (" + c + ")").join(" · ");

  const card = el("div", "briefing");
  card.append(el("div", "b-date",
    new Date().toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "long" })));
  const line = el("div", "b-line");
  line.append("Der Scout hat heute ");
  line.append(el("strong", "", heute.length === 1 ? "1 Fundstück" : heute.length + " Fundstücke"));
  line.append(" geliefert" + (teile.length ? ": " + teile.join(", ") : "") + ".");
  card.append(line);
  if (top) card.append(el("div", "b-pillars", "Schwerpunkte: " + top));
  box.append(card);
}

function emptyText() {
  if (state.q) return "Keine Treffer für „" + state.q + "“.";
  if (state.kind === "idee") return "Keine Content-Ideen in dieser Ansicht.";
  if (state.kind === "zitat") return "Keine Zitate in dieser Ansicht.";
  if (state.kind === "news") return "Keine News in dieser Ansicht.";
  return { new: "Keine neuen Meldungen.", important: "Nichts als wichtig markiert.",
           archived: "Das Archiv ist leer." }[state.tab];
}
function emptyHint() {
  if (state.q) return "Suchbegriff anpassen oder mit Esc leeren.";
  return { new: "Der Themenscout liefert täglich um 06:30 — was Neues landet automatisch hier.",
           important: "Der Stern an einer Meldung legt sie hier ab.",
           archived: "Archivierte Meldungen bleiben durchsuchbar." }[state.tab];
}

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) n.textContent = text;
  return n;
}

function entryNode(item, index) {
  const li = el("li", "entry" + (item.important ? " important" : ""));
  if (state.initialRender) li.style.animationDelay = Math.min(index, 12) * 40 + "ms";
  else li.style.animation = "none";

  const meta = el("div", "meta");
  if (item.source) meta.append(el("span", "source", item.source), el("span", "dot", "·"));
  const t = el("span", "time", relTime(item.ingested_at));
  t.title = "Eingegangen: " + absTime(item.ingested_at);
  meta.append(t);
  const ersch = erschienenText(item);
  if (ersch) {
    const e = el("span", "time", ersch);
    e.title = "Erscheinungsdatum des Originals: " + absTime(item.published_at);
    meta.append(el("span", "dot", "·"), e);
  }
  if (item.kind === "idee") meta.append(el("span", "chip idee", "Content-Idee"));
  if (item.kind === "zitat") meta.append(el("span", "chip zitat", "Zitat"));
  if (item.pillar) meta.append(el("span", "chip pillar", item.pillar));
  if (state.tab === "important" && item.status === "archived") meta.append(el("span", "chip archiviert", "archiviert"));

  const h2 = el("h2");
  // Nur echte externe Quellen verlinken — Platzhalter-URLs (eigene Domain,
  // ungültige URLs) werden als reiner Text gezeigt statt ins Leere zu führen.
  let extern = false;
  try { extern = new URL(item.url, location.href).origin !== location.origin; } catch { extern = false; }
  if (extern) {
    const a = el("a", "", item.title);
    a.href = item.url; a.target = "_blank"; a.rel = "noopener noreferrer";
    h2.append(a);
  } else {
    h2.append(el("span", "", item.title));
  }

  const actions = el("div", "actions");
  actions.append(
    iconBtn(ICONS.quill, "Verwerten: LinkedIn-Entwurf erstellen", "", () => verwerten(item)),
    iconBtn(ICONS.gauge, item.assessment ? "Resümee neu bewerten" : "Einordnen: Relevanz für Geschäft & IT-Leiter",
            "", () => einordnen(item, li)),
    iconBtn(item.important ? ICONS.starFill : ICONS.star,
            item.important ? "Wichtig-Markierung entfernen" : "Als wichtig markieren",
            "star-btn" + (item.important ? " star-on" : ""),
            () => toggleImportant(item, li)),
    iconBtn(ICONS.note, item.note ? "Notiz bearbeiten" : "Notiz hinzufügen",
            "note-btn" + (item.note ? " note-on" : ""),
            () => noteEditor(item, li)),
    iconBtn(item.status === "archived" ? ICONS.restore : ICONS.archive,
            item.status === "archived" ? "Wiederherstellen" : "Archivieren", "",
            () => toggleArchive(item, li)),
    trashBtn(item, li)
  );

  li.append(meta, h2, actions);
  if (item.summary) {
    li.append(el("p", "summary" + (item.kind === "zitat" ? " zitat" : ""), item.summary));
  }
  if (item.assessment) {
    li.append(resBlock(item));
  }
  if (item.note) {
    const nb = el("div", "note-block");
    nb.title = "Klicken zum Bearbeiten";
    nb.append(el("div", "note-label", "Meine Notiz"), el("div", "note-text", item.note));
    nb.addEventListener("click", () => noteEditor(item, li));
    li.append(nb);
  }
  return li;
}

/* ---------- Resümee (KI-Einordnung) ---------- */
const REL_LABEL = { hoch: "Relevanz hoch", mittel: "Relevanz mittel", gering: "Relevanz gering" };

function resBlock(item) {
  const rb = el("div", "res-block " + (item.relevance || ""));
  const label = el("div", "res-label");
  label.append(el("span", "res-dot"), el("span", "", "Resümee · " + (REL_LABEL[item.relevance] || "bewertet")));
  rb.append(label, el("div", "res-text", item.assessment));
  return rb;
}

async function einordnen(item, li) {
  let rb = li.querySelector(".res-block");
  if (!rb) {
    rb = el("div", "res-block");
    const nb = li.querySelector(".note-block");
    if (nb) li.insertBefore(rb, nb); else li.append(rb);
  }
  rb.className = "res-block";
  rb.textContent = "";
  const lade = el("div", "res-loading");
  lade.append(el("span"), el("span"), el("span"));
  rb.append(el("div", "res-label", "Resümee entsteht …"), lade);
  try {
    const updated = await api("/api/items/" + item.id + "/einordnen", { method: "POST" });
    Object.assign(item, updated);
    rb.replaceWith(resBlock(item));
  } catch (e) {
    rb.remove();
    if (item.assessment) li.insertBefore(resBlock(item), li.querySelector(".note-block"));
    toast(e.message);
  }
}

/* ---------- Notiz-Editor ---------- */
function noteEditor(item, li) {
  if (li.querySelector(".note-editor")) return;
  const nb = li.querySelector(".note-block");
  if (nb) nb.remove();
  const ed = el("div", "note-editor");
  const ta = document.createElement("textarea");
  ta.value = item.note || "";
  ta.placeholder = "Dein Winkel zu diesem Fund — fließt beim Verwerten in den Entwurf ein. (Leer speichern entfernt die Notiz.)";
  ta.maxLength = 5000;
  const row = el("div", "row");
  const save = el("button", "vw-btn primary", "Speichern"); save.type = "button";
  const cancel = el("button", "vw-btn", "Abbrechen"); cancel.type = "button";
  row.append(save, cancel);
  ed.append(ta, row);
  li.append(ed);
  ta.focus();
  cancel.addEventListener("click", () => li.replaceWith(entryNode(item, 0)));
  save.addEventListener("click", async () => {
    save.disabled = true;
    try {
      const updated = await api("/api/items/" + item.id, { method: "PATCH", body: JSON.stringify({ note: ta.value }) });
      Object.assign(item, updated);
      li.replaceWith(entryNode(item, 0));
      toast(item.note ? "Notiz gespeichert." : "Notiz entfernt.");
    } catch (e) {
      toast(e.message);
      save.disabled = false;
    }
  });
}

function iconBtn(svg, label, cls, onClick) {
  const b = el("button", cls || "");
  b.type = "button"; b.innerHTML = svg;
  b.title = label; b.setAttribute("aria-label", label);
  b.addEventListener("click", onClick);
  return b;
}

function trashBtn(item, li) {
  const b = iconBtn(ICONS.trash, "Löschen", "", () => {
    if (!b.classList.contains("confirm")) {
      b.classList.add("confirm"); b.textContent = "Löschen?";
      setTimeout(() => { if (b.isConnected && b.classList.contains("confirm")) {
        b.classList.remove("confirm"); b.textContent = ""; b.innerHTML = ICONS.trash;
      } }, 2600);
    } else {
      removeItem(item, li);
    }
  });
  return b;
}

/* ---------- Aktionen ---------- */
async function toggleImportant(item, li) {
  const target = !item.important;
  try {
    const updated = await api("/api/items/" + item.id, { method: "PATCH", body: JSON.stringify({ important: target }) });
    Object.assign(item, updated);
    state.counts.important += target ? 1 : -1;
    if (state.tab === "important" && !target) return removeRow(item, li);
    li.classList.toggle("important", item.important);
    const btn = li.querySelector(".actions .star-btn");
    btn.classList.toggle("star-on", item.important);
    btn.innerHTML = item.important ? ICONS.starFill : ICONS.star;
    btn.title = btn.ariaLabel = item.important ? "Wichtig-Markierung entfernen" : "Als wichtig markieren";
    btn.classList.add("popping"); setTimeout(() => btn.classList.remove("popping"), 380);
    render_counts_only();
  } catch (e) { toast(e.message); }
}

async function toggleArchive(item, li) {
  const target = item.status === "archived" ? "new" : "archived";
  try {
    const updated = await api("/api/items/" + item.id, { method: "PATCH", body: JSON.stringify({ status: target }) });
    Object.assign(item, updated);
    state.counts.new += target === "archived" ? -1 : 1;
    state.counts.archived += target === "archived" ? 1 : -1;
    if (state.tab !== "important") return removeRow(item, li);
    render();
  } catch (e) { toast(e.message); }
}

async function removeItem(item, li) {
  try {
    await api("/api/items/" + item.id, { method: "DELETE" });
    if (item.status === "new") state.counts.new -= 1;
    if (item.status === "archived") state.counts.archived -= 1;
    if (item.important) state.counts.important -= 1;
    removeRow(item, li);
  } catch (e) { toast(e.message); }
}

function removeRow(item, li) {
  state.items = state.items.filter(x => x.id !== item.id);
  li.classList.add("leaving");
  setTimeout(() => {
    state.initialRender = false;
    render();
    if (state.items.length === 0 && state.mayHaveMore) load(true).catch(e => toast(e.message));
  }, 280);
}

function render_counts_only() {
  for (const key of ["new", "important", "archived", "drafts"]) {
    $("count-" + key).textContent = state.counts[key] > 0 ? String(state.counts[key]) : "";
  }
}

/* ---------- Entwürfe-Tab ---------- */
function renderDrafts() {
  const q = state.q.toLowerCase();
  const list = state.drafts.filter(d =>
    !q || d.text.toLowerCase().includes(q) || (d.item_title || "").toLowerCase().includes(q));
  let lastLabel = null;
  list.forEach((d, i) => {
    const label = dayLabel(d.updated_at);
    if (label !== lastLabel) {
      listEl.appendChild(el("li", "day-sep", label));
      lastLabel = label;
    }
    listEl.appendChild(draftNode(d, i));
  });
  if (list.length === 0) {
    stateBox.hidden = false;
    stateBox.textContent = "";
    stateBox.append(el("span", "orn", "⁂"),
      el("div", "", q ? "Keine Entwürfe zu „" + state.q + "“." : "Noch keine gespeicherten Entwürfe."),
      el("div", "hint", q ? "Suchbegriff anpassen oder mit Esc leeren."
                          : "Im LinkedIn-Fenster „Speichern“ klicken — dann landet der Entwurf hier."));
  } else {
    stateBox.hidden = true;
  }
  moreBtn.hidden = true;
}

function draftTitel(text) {
  const zeile = (text || "").split("\n").map(z => z.trim()).find(z => z) || "Entwurf";
  return zeile.length > 110 ? zeile.slice(0, 110) + "…" : zeile;
}

function draftNode(d, index) {
  const li = el("li", "entry" + (d.status === "gepostet" ? " gepostet" : ""));
  if (state.initialRender) li.style.animationDelay = Math.min(index, 12) * 40 + "ms";
  else li.style.animation = "none";

  const meta = el("div", "meta");
  meta.append(el("span", "source", d.item_title || "Freier Entwurf"), el("span", "dot", "·"));
  const t = el("span", "time", relTime(d.updated_at));
  t.title = absTime(d.updated_at);
  meta.append(t);
  if (d.status === "gepostet") meta.append(el("span", "chip gepostet", "gepostet"));
  (d.scores || []).forEach(s => {
    if (s.score !== null && s.score !== undefined) {
      meta.append(el("span", "d-score " + scoreKlasse(s.score),
        ((s.name || "?").split(" ")[0]) + " " + s.score));
    }
  });

  const h2 = el("h2");
  h2.append(el("span", "", draftTitel(d.text)));

  const actions = el("div", "actions");
  actions.append(
    iconBtn(ICONS.open, "Öffnen: bearbeiten, prüfen lassen, überarbeiten", "", () => openDraft(d)),
    iconBtn(ICONS.copy, "Text kopieren", "", async () => {
      try { await navigator.clipboard.writeText(d.text); toast("Entwurf kopiert — ab damit zu LinkedIn."); }
      catch { toast("Kopieren fehlgeschlagen — Text bitte manuell markieren."); }
    }),
    iconBtn(ICONS.check, d.status === "gepostet" ? "Zurück auf „Entwurf“ setzen" : "Als gepostet markieren",
            d.status === "gepostet" ? "check-on" : "", () => toggleGepostet(d, li)),
    draftTrashBtn(d, li)
  );

  const text = el("p", "d-text", d.text);
  text.title = "Klicken zum Auf- und Zuklappen";
  text.addEventListener("click", () => text.classList.toggle("open"));

  li.append(meta, h2, actions, text);
  return li;
}

async function toggleGepostet(d, li) {
  const target = d.status === "gepostet" ? "entwurf" : "gepostet";
  try {
    const updated = await api("/api/drafts/" + d.id, { method: "PATCH", body: JSON.stringify({ status: target }) });
    Object.assign(d, updated);
    state.initialRender = false;
    li.replaceWith(draftNode(d, 0));
    toast(target === "gepostet" ? "Als gepostet markiert." : "Zurück auf „Entwurf“.");
  } catch (e) { toast(e.message); }
}

function draftTrashBtn(d, li) {
  const b = iconBtn(ICONS.trash, "Löschen", "", async () => {
    if (!b.classList.contains("confirm")) {
      b.classList.add("confirm"); b.textContent = "Löschen?";
      setTimeout(() => { if (b.isConnected && b.classList.contains("confirm")) {
        b.classList.remove("confirm"); b.textContent = ""; b.innerHTML = ICONS.trash;
      } }, 2600);
    } else {
      try {
        await api("/api/drafts/" + d.id, { method: "DELETE" });
        state.drafts = state.drafts.filter(x => x.id !== d.id);
        state.counts.drafts = Math.max(0, (state.counts.drafts || 0) - 1);
        li.classList.add("leaving");
        setTimeout(() => { state.initialRender = false; render(); }, 280);
      } catch (e) { toast(e.message); }
    }
  });
  return b;
}

function openDraft(d) {
  vw.item = null;
  vw.draftId = d.id;
  vw.quelleText = d.item_title ? "Grundlage: " + d.item_title : "Freier Entwurf";
  vw.anweisung = "";
  vw.gesichert = d.text;  // unverändertes Schließen braucht keine Nachfrage
  vwShow();
  renderDraft(d.text);
}

/* ---------- Verwerten: LinkedIn-Entwurf ---------- */
const vw = { item: null, draft: "", results: {}, include: {}, draftId: null,
             quelleText: "", anweisung: "", laufend: false, stoppen: false, gesichert: null };

function vwShow() { $("vwOverlay").hidden = false; }
function vwHide() {
  $("vwOverlay").hidden = true;
  vw.item = null; vw.draft = ""; vw.results = {}; vw.include = {};
  vw.draftId = null; vw.quelleText = ""; vw.anweisung = ""; vw.gesichert = null;
  $("vwBody").classList.remove("two-col");
  document.querySelector(".vw-panel").classList.remove("breit");
  $("vwRevise").disabled = true;
  $("vwRevise").textContent = "Überarbeiten";
  $("vwSave").disabled = true;
  $("vwLoop").disabled = true;
  // Bewusstes Schließen = Auto-Sicherung wird nicht mehr gebraucht
  try { localStorage.removeItem(AUTOSAVE_KEY); } catch { /* egal */ }
  const bar = $("restoreBar"); if (bar) bar.remove();
  if (state.tab === "drafts") load(true).catch(e => toast(e.message));
}

function vwLoading(text) {
  const body = $("vwBody");
  body.textContent = "";
  body.classList.remove("two-col");
  const box = el("div", "vw-loading");
  const dots = el("div", "vw-dots");
  dots.append(el("span"), el("span"), el("span"));
  box.append(dots, el("div", "", text || "Entwurf entsteht — dauert einen Moment …"));
  body.append(box);
  $("vwCopy").disabled = true;
  $("vwRetry").disabled = true;
  $("vwRevise").disabled = true;
  $("vwSave").disabled = true;
  $("vwLoop").disabled = true;
}

function vwQuelleZeile(item) {
  const teile = [];
  if (item.kind === "idee") teile.push("Content-Idee");
  else if (item.kind === "zitat") teile.push("Zitat");
  else teile.push("Meldung");
  if (item.pillar) teile.push(item.pillar);
  if (item.source) teile.push(item.source);
  return "Grundlage: " + teile.join(" · ");
}

const PRUEFER_LISTE = [
  { key: "ronny", name: "Ronny Berger", rolle: "IT-Leiter, 30 Jahre Praxis", initial: "R" },
  { key: "claudia", name: "Claudia Brenner", rolle: "IT-Directorin, Industrie", initial: "C" },
  { key: "markus", name: "Markus Leitner", rolle: "Head of IT, Mittelstand — erste 100 Tage", initial: "M" }
];

async function verwerten(item) {
  vw.item = item;
  vw.results = {};
  vw.draftId = null;   // frisch generiert = beim Speichern ein neuer Bibliothekseintrag
  vw.quelleText = "";
  vw.anweisung = "";
  vw.gesichert = null;
  vwShow();
  vwLoading();
  try {
    const data = await api("/api/items/" + item.id + "/verwerten", { method: "POST" });
    renderDraft(data.draft);
  } catch (e) {
    const body = $("vwBody");
    body.textContent = "";
    body.append(el("div", "vw-error", e.message));
    $("vwCopy").disabled = true;
    $("vwRetry").disabled = false;
  }
}

function scoreKlasse(score) {
  if (score === null || score === undefined) return "";
  return score >= 8 ? "hoch" : score >= 6 ? "mittel" : "gering";
}

function autosize(ta) {
  ta.style.height = "auto";
  ta.style.height = (ta.scrollHeight + 2) + "px";
}

function renderDraft(draft) {
  vw.draft = draft;
  vw.results = {};
  vw.include = {};
  const body = $("vwBody");
  body.textContent = "";
  body.classList.add("two-col");
  document.querySelector(".vw-panel").classList.add("breit");

  // Linke Spalte: Quelle + direkt editierbarer Entwurf
  const main = el("div", "vw-main");
  const quelle = vw.item ? vwQuelleZeile(vw.item) : (vw.quelleText || "Neuer Entwurf");
  main.append(el("div", "vw-quelle", quelle + " · Text direkt bearbeitbar"));
  const ta = document.createElement("textarea");
  ta.className = "vw-draft";
  ta.value = draft;
  ta.maxLength = 12000;
  ta.spellcheck = false;
  ta.addEventListener("input", () => { vw.draft = ta.value; autosichern(); });
  if ("fieldSizing" in ta.style) {
    ta.style.fieldSizing = "content"; // Browser hält die Höhe selbst aktuell
  } else {
    const wachsen = () => autosize(ta);
    ta.addEventListener("input", wachsen);
    requestAnimationFrame(wachsen);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(wachsen);
  }
  main.append(ta);
  body.append(main);

  // Rechte Spalte: Prüfstand
  const zone = el("div", "pruef-zone");
  zone.append(el("div", "pruef-titel", "PRÜFSTAND — WIE DIE ZIELGRUPPE URTEILT"));
  const karten = el("div", "pruef-karten");
  PRUEFER_LISTE.forEach(p => karten.append(pruefKarte(p)));
  zone.append(karten);
  const anw = document.createElement("textarea");
  anw.className = "pruef-anweisung";
  anw.id = "vwAnweisung";
  anw.rows = 2;
  anw.maxLength = 2000;
  anw.placeholder = "Regie-Anweisung für die Überarbeitung (optional) — z. B. „nur Claudias Vorschlag 2 umsetzen, Rest ignorieren“";
  anw.value = vw.anweisung || "";  // bleibt über Überarbeitungs-Runden erhalten
  anw.addEventListener("input", () => { vw.anweisung = anw.value; });
  zone.append(anw);
  body.append(zone);

  $("vwCopy").disabled = vw.laufend;
  $("vwSave").disabled = vw.laufend;
  $("vwRetry").disabled = vw.laufend || !vw.item;
  $("vwLoop").disabled = vw.laufend;
  syncUeberarbeiten();
  autosichern();
}

/* ---------- Auto-Sicherung: übersteht Browser-Absturz und Reload ---------- */
const AUTOSAVE_KEY = "cockpit_vw_autosave";

function autosichern() {
  try {
    if (!vw.draft.trim()) return;
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({
      draft: vw.draft,
      anweisung: vw.anweisung || "",
      quelle: vw.item ? vwQuelleZeile(vw.item) : (vw.quelleText || "Wiederhergestellter Entwurf"),
      draftId: vw.draftId,
      ts: Date.now()
    }));
  } catch { /* Speicher voll o. ä. — Sicherung ist Komfort, kein Muss */ }
}

function checkAutosave() {
  let data = null;
  try { data = JSON.parse(localStorage.getItem(AUTOSAVE_KEY) || "null"); } catch { data = null; }
  if (!data || !data.draft || !data.draft.trim()) return;
  if (Date.now() - (data.ts || 0) > 72 * 3600 * 1000) {
    try { localStorage.removeItem(AUTOSAVE_KEY); } catch { /* egal */ }
    return;
  }
  if ($("restoreBar")) return;
  const bar = el("div", "restore-bar");
  bar.id = "restoreBar";
  const wann = new Date(data.ts).toLocaleString("de-DE", { hour: "2-digit", minute: "2-digit" });
  bar.append(el("span", "", "Nicht gesicherter LinkedIn-Entwurf gefunden (Stand " + wann + " Uhr) — vermutlich durch Absturz oder Neuladen unterbrochen."));
  const oeffnen = el("button", "vw-btn primary", "Öffnen");
  oeffnen.type = "button";
  oeffnen.addEventListener("click", () => {
    bar.remove();
    vw.item = null;
    vw.draftId = data.draftId || null;
    vw.quelleText = (data.quelle || "Wiederhergestellter Entwurf");
    vw.anweisung = data.anweisung || "";
    vw.gesichert = null;
    vwShow();
    renderDraft(data.draft);
  });
  const weg = el("button", "vw-btn", "Verwerfen");
  weg.type = "button";
  weg.addEventListener("click", () => {
    try { localStorage.removeItem(AUTOSAVE_KEY); } catch { /* egal */ }
    bar.remove();
  });
  bar.append(oeffnen, weg);
  const main = document.querySelector("main");
  main.insertBefore(bar, main.firstChild);
}

function pruefKarte(p) {
  const karte = el("div", "pruef-karte");
  karte.id = "pk-" + p.key;
  const kopf = el("div", "pruef-kopf");
  kopf.append(el("div", "pruef-avatar " + p.key, p.initial));
  const wer = el("div", "pruef-wer");
  wer.append(el("div", "pruef-name", p.name), el("div", "pruef-rolle", p.rolle));
  kopf.append(wer);
  const start = el("button", "pruef-start", "Bewerten lassen");
  start.type = "button";
  start.addEventListener("click", () => pruefenLassen(p));
  kopf.append(start);
  karte.append(kopf);
  return karte;
}

async function pruefenLassen(p, ausSchleife) {
  if (vw.laufend && !ausSchleife) return null; // Karten-Knöpfe während der Schleife gesperrt
  const karte = $("pk-" + p.key);
  if (!karte) return null;
  const kopf = karte.querySelector(".pruef-kopf");
  kopf.querySelectorAll(".pruef-start, .pruef-score, .pruef-check").forEach(n => n.remove());
  karte.querySelectorAll(".pruef-feedback, .pruef-fehler, .pruef-mini").forEach(n => n.remove());
  delete vw.results[p.key];
  delete vw.include[p.key];
  syncUeberarbeiten();
  const lade = el("div", "pruef-mini");
  const dots = el("span", "vw-dots"); dots.append(el("span"), el("span"), el("span"));
  lade.append(dots, el("span", "", p.name + " liest …"));
  kopf.insertAdjacentElement("afterend", lade);
  try {
    const r = await api("/api/pruefen", { method: "POST", body: JSON.stringify({ entwurf: vw.draft, pruefer: p.key }) });
    vw.results[p.key] = r;
    vw.include[p.key] = true;
    lade.remove();
    if (r.score !== null && r.score !== undefined) {
      kopf.append(el("div", "pruef-score " + scoreKlasse(r.score), r.score));
    }
    kopf.insertAdjacentElement("afterend", el("div", "pruef-feedback", r.feedback));
    // Auswahl: fließt dieses Urteil in die Überarbeitung ein?
    const check = el("label", "pruef-check");
    check.title = "Nur angehakte Urteile fließen in die Überarbeitung ein";
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = true;
    cb.addEventListener("change", () => { vw.include[p.key] = cb.checked; syncUeberarbeiten(); });
    check.append(cb, el("span", "", "einbeziehen"));
    kopf.append(check);
    const neu = el("button", "pruef-start", "Neu");
    neu.type = "button"; neu.title = "Erneut bewerten lassen";
    neu.addEventListener("click", () => pruefenLassen(p));
    kopf.append(neu);
    syncUeberarbeiten();
    return r;
  } catch (e) {
    lade.remove();
    kopf.insertAdjacentElement("afterend", el("div", "pruef-fehler", e.message));
    const retry = el("button", "pruef-start", "Erneut");
    retry.type = "button";
    retry.addEventListener("click", () => pruefenLassen(p));
    kopf.append(retry);
    return null;
  }
}

function ausgewaehltesFeedback() {
  return Object.keys(vw.results || {})
    .filter(k => vw.include[k])
    .map(k => vw.results[k]);
}

function syncUeberarbeiten() {
  const anz = ausgewaehltesFeedback().length;
  const btn = $("vwRevise");
  if (btn) {
    btn.disabled = vw.laufend || anz === 0;
    btn.textContent = anz === 0 ? "Überarbeiten" : "Überarbeiten (" + anz + ")";
  }
}

async function ueberarbeiten() {
  const feedback = ausgewaehltesFeedback();
  if (!feedback.length) return false;
  const anweisung = (vw.anweisung || "").trim();
  const vorher = vw.draft;
  vwLoading("Überarbeite mit dem Feedback …");
  try {
    const data = await api("/api/ueberarbeiten", {
      method: "POST",
      body: JSON.stringify({ entwurf: vorher, feedback, anweisung })
    });
    renderDraft(data.draft);
    if (!vw.laufend) toast("Überarbeitet — die Prüfer können erneut urteilen.");
    return true;
  } catch (e) {
    renderDraft(vorher); // alten Entwurf zurückholen
    toast(e.message);
    return false;
  }
}

/* Prüfschleife: beide Prüfer urteilen parallel; reicht es nicht, wird mit
   dem gesammelten Feedback überarbeitet und erneut geprüft. Stoppt, sobald
   ein Urteil BESTANDEN_AB erreicht — oder nach MAX_UEBERARBEITUNGEN Runden. */
const BESTANDEN_AB = 8;
const MAX_UEBERARBEITUNGEN = 2;

async function pruefSchleife() {
  if (vw.laufend || !vw.draft.trim()) return;
  vw.laufend = true;
  vw.stoppen = false;
  const loopBtn = $("vwLoop");
  loopBtn.textContent = "Stopp";
  loopBtn.title = "Prüfschleife anhalten — der aktuelle Stand bleibt stehen";
  ["vwCopy", "vwSave", "vwRetry", "vwRevise"].forEach(id => { $(id).disabled = true; });
  loopBtn.disabled = false; // bleibt bedienbar: er ist jetzt der Stopp-Knopf
  const titelEl = () => document.querySelector("#vwBody .pruef-titel");
  let fazit = "";
  try {
    for (let runde = 1; runde <= MAX_UEBERARBEITUNGEN + 1; runde++) {
      if ($("vwOverlay").hidden || vw.stoppen) { fazit = "SCHLEIFE GESTOPPT"; return; }
      const t = titelEl();
      if (t) t.textContent = "PRÜFSTAND — RUNDE " + runde + " VON " + (MAX_UEBERARBEITUNGEN + 1) + " LÄUFT …";
      const ergebnisse = (await Promise.all(PRUEFER_LISTE.map(p => pruefenLassen(p, true)))).filter(Boolean);
      if (!ergebnisse.length) {
        fazit = "PRÜFUNG FEHLGESCHLAGEN";
        toast("Prüfung fehlgeschlagen — bitte einzeln erneut versuchen.");
        return;
      }
      const best = Math.max(...ergebnisse.map(r => r.score ?? 0));
      if (best >= BESTANDEN_AB) {
        fazit = "BESTANDEN IN RUNDE " + runde + " — BESTES URTEIL " + best + "/10";
        toast("Bestanden in Runde " + runde + " — bestes Urteil " + best + "/10.");
        return;
      }
      if (vw.stoppen) { fazit = "SCHLEIFE GESTOPPT — BESTES URTEIL " + best + "/10"; return; }
      if (runde === MAX_UEBERARBEITUNGEN + 1) {
        fazit = "SCHLEIFE BEENDET — BESTES URTEIL " + best + "/10";
        toast("Bestes Urteil nach " + MAX_UEBERARBEITUNGEN + " Überarbeitungen: " + best + "/10 — ab hier hilft eine Regie-Anweisung oder Handarbeit.");
        return;
      }
      toast("Runde " + runde + ": bestes Urteil " + best + "/10 — überarbeite …");
      const ok = await ueberarbeiten();
      if (!ok) { fazit = "ABGEBROCHEN — FEHLER BEI DER ÜBERARBEITUNG"; return; }
    }
  } finally {
    vw.laufend = false;
    vw.stoppen = false;
    loopBtn.textContent = "Prüfschleife";
    loopBtn.title = "Alle Prüfer urteilen; bei Bedarf wird automatisch überarbeitet und erneut geprüft — bis ein Urteil mindestens 8/10 erreicht (max. 2 Überarbeitungen). Während des Laufs wird dieser Knopf zum Stopp.";
    const t = titelEl();
    if (t && fazit) t.textContent = "PRÜFSTAND — " + fazit;
    if (!$("vwOverlay").hidden && $("vwBody").querySelector("textarea.vw-draft")) {
      $("vwCopy").disabled = false;
      $("vwSave").disabled = false;
      $("vwRetry").disabled = !vw.item;
      loopBtn.disabled = false;
      syncUeberarbeiten();
    } else {
      loopBtn.disabled = true;
    }
  }
}

async function saveDraft() {
  if (!vw.draft.trim()) { toast("Leerer Entwurf — nichts zu speichern."); return; }
  const btn = $("vwSave");
  btn.disabled = true;
  const text = vw.draft;
  const scores = Object.values(vw.results || {}).map(r => ({ pruefer: r.pruefer, name: r.name, score: r.score }));
  try {
    if (vw.draftId) {
      const body = { text };
      if (scores.length) body.scores = scores; // alte Urteile nicht mit leerer Liste überschreiben
      await api("/api/drafts/" + vw.draftId, { method: "PATCH", body: JSON.stringify(body) });
      vw.gesichert = text;
      toast("Entwurf aktualisiert.");
    } else {
      const d = await api("/api/drafts", { method: "POST", body: JSON.stringify({
        text,
        item_id: vw.item ? vw.item.id : null,
        item_title: vw.item ? vw.item.title : "",
        scores
      }) });
      vw.draftId = d.id;
      vw.gesichert = text;
      state.counts.drafts = (state.counts.drafts || 0) + 1;
      render_counts_only();
      toast("Gespeichert — zu finden im Tab „Entwürfe“.");
    }
  } catch (e) {
    toast(e.message);
  }
  btn.disabled = false;
}

/* Schließen mit Verlust-Schutz: Klick NEBEN das Fenster schließt bewusst
   NICHT mehr (dort liegt editierbare Arbeit). Explizites Schließen fragt
   nach, wenn die Prüfschleife läuft oder ungesicherte Änderungen da sind. */
function vwSchliessenAnfragen() {
  if (vw.laufend) {
    if (!confirm("Die Prüfschleife läuft noch — wirklich abbrechen und schließen?")) return;
  } else if (vw.draft.trim() && vw.draft !== vw.gesichert) {
    if (!confirm("Der Entwurf ist nicht gespeichert und geht beim Schließen verloren.\n(Der Speichern-Knopf legt ihn im Tab „Entwürfe“ ab.)\n\nTrotzdem schließen?")) return;
  }
  vwHide();
}
$("vwClose").addEventListener("click", vwSchliessenAnfragen);
$("vwCancel").addEventListener("click", vwSchliessenAnfragen);
document.addEventListener("keydown", (ev) => { if (ev.key === "Escape" && !$("vwOverlay").hidden) vwSchliessenAnfragen(); });
$("vwRetry").addEventListener("click", () => { if (vw.item) verwerten(vw.item); });
$("vwRevise").addEventListener("click", ueberarbeiten);
$("vwSave").addEventListener("click", saveDraft);
$("vwLoop").addEventListener("click", () => {
  if (vw.laufend) {
    // Läuft bereits → Knopf wirkt als Stopp (greift am nächsten Zwischenschritt)
    vw.stoppen = true;
    $("vwLoop").disabled = true;
    $("vwLoop").textContent = "Stoppe …";
  } else {
    pruefSchleife();
  }
});
$("vwCopy").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(vw.draft);
    toast("Entwurf kopiert — ab damit zu LinkedIn.");
  } catch {
    toast("Kopieren fehlgeschlagen — Text bitte manuell markieren.");
  }
});

/* ---------- Tabs, Art-Filter, Suche, Mehr ---------- */
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
  if (t.dataset.tab === state.tab) return;
  state.tab = t.dataset.tab;
  state.initialRender = true;
  load(true).catch(e => toast(e.message));
}));

document.querySelectorAll(".kind-chip").forEach(c => c.addEventListener("click", () => {
  if (c.dataset.kind === state.kind) return;
  state.kind = c.dataset.kind;
  state.initialRender = true;
  load(true).catch(e => toast(e.message));
}));

let searchTimer = null;
$("searchInput").addEventListener("input", (ev) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.q = ev.target.value.trim();
    load(true).catch(e => toast(e.message));
  }, 300);
});
$("searchInput").addEventListener("keydown", (ev) => {
  if (ev.key === "Escape") { ev.target.value = ""; state.q = ""; load(true).catch(e => toast(e.message)); }
});
document.addEventListener("keydown", (ev) => {
  if (ev.key === "/" && !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)) {
    ev.preventDefault(); $("searchInput").focus();
  }
});

moreBtn.addEventListener("click", () => {
  state.offset += state.limit;
  load(false).catch(e => toast(e.message));
});

$("exportBtn").addEventListener("click", async () => {
  try {
    await api("/api/me"); // Session prüfen, damit der Download nicht in einer JSON-Fehlerseite endet
    window.location.href = "/api/export?days=7";
    toast("Wochen-Export wird heruntergeladen …");
  } catch { /* 401-Pfad zeigt bereits den Login */ }
});

/* ---------- Zeit & Toast ---------- */
function relTime(iso) {
  if (!iso) return "";
  const then = new Date(iso), now = new Date();
  const mins = Math.round((now - then) / 60000);
  if (isNaN(mins)) return "";
  if (mins < 1) return "gerade eben";
  if (mins < 60) return "vor " + mins + " Min.";
  const hours = Math.round(mins / 60);
  if (hours < 24) return "vor " + hours + " Std.";
  const days = Math.round(hours / 24);
  if (days === 1) return "gestern";
  if (days < 7) return "vor " + days + " Tagen";
  return then.toLocaleDateString("de-DE", { day: "numeric", month: "long" });
}
function absTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return isNaN(d) ? "" : d.toLocaleString("de-DE", { dateStyle: "full", timeStyle: "short" });
}

let toastTimer = null;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
}

/* ---------- Update-Erkennung: offenes Fenster erfährt von neuen Deployments ---------- */
let appBuild = null;
let updateGemeldet = null;

async function versionCheck() {
  let v = null;
  try {
    const res = await fetch("/api/version", { cache: "no-store" });
    if (!res.ok) return;
    v = await res.json();
  } catch { return; /* offline o. ä. — beim nächsten Mal wieder */ }
  if (!v || !v.build) return;
  if (appBuild === null) { appBuild = v.build; return; }
  if (v.build === appBuild || v.build === updateGemeldet) return;
  updateGemeldet = v.build;
  if ($("updateBar")) return;
  const bar = el("div", "restore-bar");
  bar.id = "updateBar";
  bar.append(el("span", "", "Eine neue Version des Cockpits ist verfügbar. Ein offener Entwurf ist über die Auto-Sicherung geschützt."));
  const neu = el("button", "vw-btn primary", "Jetzt neu laden");
  neu.type = "button";
  neu.addEventListener("click", () => location.reload());
  const spaeter = el("button", "vw-btn", "Später");
  spaeter.type = "button";
  spaeter.addEventListener("click", () => bar.remove());
  bar.append(neu, spaeter);
  const main = document.querySelector("main");
  main.insertBefore(bar, main.firstChild);
}

setInterval(versionCheck, 15 * 60 * 1000);
document.addEventListener("visibilitychange", () => { if (!document.hidden) versionCheck(); });

/* ---------- Start ---------- */
$("today").textContent = new Date().toLocaleDateString("de-DE",
  { weekday: "long", day: "numeric", month: "long", year: "numeric" });

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => { /* PWA optional */ });
}

(async function init() {
  versionCheck(); // merkt sich den aktuellen Stand fürs spätere Vergleichen
  try {
    await api("/api/me");
    showApp();
    await load(true);
    checkAutosave();
  } catch { /* showLogin() lief bereits über den 401-Pfad */ }
})();
</script>
